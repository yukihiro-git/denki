<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電気通信事業届出 判定ツール</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --background-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-radius: 12px;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--background-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            height: 6px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary-color);
            width: 25%;
            transition: width 0.4s ease;
        }

        .content-area {
            padding: 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .step-badge {
            display: inline-block;
            background-color: #edf2f7;
            color: var(--secondary-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.4;
            color: var(--primary-color);
        }

        .description-box {
            background-color: #f1f8ff;
            border-left: 4px solid var(--secondary-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .description-text {
            font-size: 1rem;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .example-text {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.5;
            background: rgba(255,255,255,0.6);
            padding: 8px;
            border-radius: 4px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: auto;
            padding-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-no {
            background-color: white;
            color: var(--text-sub);
            border: 2px solid #cbd5e0;
        }

        .btn-no:hover {
            background-color: #f8fafc;
            border-color: #a0aec0;
        }

        .btn-yes {
            background-color: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        .btn-yes:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(52, 152, 219, 0.3);
        }

        .btn-reset {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            margin-top: 20px;
        }

        .btn-reset:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Result View Styles */
        .result-view {
            text-align: center;
            display: none;
            animation: fadeIn 0.5s;
        }

        .result-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-subtitle {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .status-danger { color: var(--danger-color); }
        .status-success { color: var(--success-color); }

        .fade-in { animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .button-group { flex-direction: column; }
            .content-area { padding: 20px; }
            .question-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>電気通信事業届出 判定ツール</h1>
    </div>
    
    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="content-area">
        <div id="question-view" class="fade-in">
            <div class="step-badge" id="step-badge">STEP 1</div>
            <div class="question-title" id="question-title">読込中...</div>
            
            <div class="description-box">
                <div class="description-text" id="description-text"></div>
                <div class="example-text" id="example-text"></div>
            </div>

            <div class="button-group">
                <button class="btn btn-no" onclick="handleAnswer(false)">
                    <span>NO</span>
                </button>
                <button class="btn btn-yes" onclick="handleAnswer(true)">
                    <span>YES</span>
                </button>
            </div>
        </div>

        <div id="result-view" class="result-view">
            <div id="result-icon" class="result-icon"></div>
            <div class="result-title" id="result-title"></div>
            <div class="result-subtitle" id="result-subtitle"></div>
            
            <button class="btn btn-reset" onclick="resetApp()">
                最初から判定する
            </button>
        </div>
    </div>
</div>

<script>
    const stepsData = [
        {
            step: 1,
            title: "他人の通信を媒介しているか",
            description: "利用者A → サービス → 利用者B の形で、通信を中継・成立させているかを確認する。",
            example: "例：メッセージ、チャット、投稿、コメント、音声通話、動画通話、データ送受信",
            noResultTitle: "電気通信事業ではない",
            noResultSubtitle: "単なる情報提供等に該当します。"
        },
        {
            step: 2,
            title: "不特定または多数の者に提供しているか",
            description: "社会一般に開放されているか、または限定利用でも相当数の利用者がいるかを確認する。",
            example: "不特定：誰でも登録・契約すれば利用可能\n多数：数百〜数千ユーザー、複数法人・多拠点など",
            noResultTitle: "電気通信事業ではない",
            noResultSubtitle: "社内・特定企業専用等に該当します。"
        },
        {
            step: 3,
            title: "反復継続して提供しているか（事業性）",
            description: "単発ではなく、継続的に運営されるサービス・SaaS・プラットフォームかを確認する。",
            example: "有料・無料は問わない。無料サービスでも反復継続であれば該当し得る。",
            noResultTitle: "電気通信事業ではない",
            noResultSubtitle: "一時的・実験的提供等に該当します。"
        },
        {
            step: 4,
            title: "電気通信設備を利用しているか",
            description: "通信を成立させる設備を用いているかを確認する。",
            example: "例：サーバー、通信回線、ネットワーク機器、クラウドサービスなど",
            noResultTitle: "通常は該当しにくい",
            noResultSubtitle: "通信設備利用がない場合です。"
        }
    ];

    let currentIndex = 0;

    const elements = {
        questionView: document.getElementById('question-view'),
        resultView: document.getElementById('result-view'),
        progressBar: document.getElementById('progress-bar'),
        progressContainer: document.getElementById('progress-container'),
        stepBadge: document.getElementById('step-badge'),
        questionTitle: document.getElementById('question-title'),
        descText: document.getElementById('description-text'),
        exampleText: document.getElementById('example-text'),
        resultIcon: document.getElementById('result-icon'),
        resultTitle: document.getElementById('result-title'),
        resultSubtitle: document.getElementById('result-subtitle')
    };

    function renderCurrentStep() {
        const currentData = stepsData[currentIndex];
        
        // アニメーションのリセット
        elements.questionView.classList.remove('fade-in');
        void elements.questionView.offsetWidth; // リフロー強制
        elements.questionView.classList.add('fade-in');

        // プログレスバーの更新
        const progressPercentage = ((currentIndex + 1) / stepsData.length) * 100;
        elements.progressBar.style.width = `${progressPercentage}%`;

        // テキストの更新
        elements.stepBadge.textContent = `STEP ${currentData.step}`;
        elements.questionTitle.textContent = currentData.title;
        elements.descText.textContent = currentData.description;
        
        // 改行をbrタグに変換して表示
        elements.exampleText.innerHTML = currentData.example.replace(/\n/g, '<br>');
    }

    function handleAnswer(isYes) {
        if (!isYes) {
            // NOの場合の処理
            const currentData = stepsData[currentIndex];
            showResult(currentData.noResultTitle, currentData.noResultSubtitle, false);
        } else {
            // YESの場合の処理
            if (currentIndex < stepsData.length - 1) {
                currentIndex++;
                renderCurrentStep();
            } else {
                // すべてYESだった場合の処理
                showResult(
                    "電気通信事業に該当する可能性が高い",
                    "総務省への届出要否を具体的に検討する段階です。",
                    true
                );
            }
        }
    }

    function showResult(title, subtitle, isApplicable) {
        elements.questionView.classList.add('hidden');
        elements.progressContainer.classList.add('hidden');
        elements.resultView.classList.remove('hidden');
        elements.resultView.style.display = 'block';

        elements.resultTitle.textContent = title;
        elements.resultSubtitle.textContent = subtitle;

        if (isApplicable) {
            elements.resultIcon.innerHTML = "⚠️";
            elements.resultTitle.className = "result-title status-danger";
        } else {
            elements.resultIcon.innerHTML = "✅";
            elements.resultTitle.className = "result-title status-success";
        }
    }

    function resetApp() {
        currentIndex = 0;
        elements.resultView.style.display = 'none';
        elements.resultView.classList.add('hidden');
        elements.questionView.classList.remove('hidden');
        elements.progressContainer.classList.remove('hidden');
        renderCurrentStep();
    }

    // 初期化
    renderCurrentStep();
</script>

</body>
</html>
